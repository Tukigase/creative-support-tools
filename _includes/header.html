<header class="header" style="position: relative;">
    {% if page.url != "/" and page.url != "/index.html" %}
    <button id="smartBackBtn" class="back-button" style="background: none; border: none; padding: 0; cursor: pointer; font-family: inherit;">
        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"
            stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        <span class="back-text">戻る</span>
    </button>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const backBtn = document.getElementById('smartBackBtn');
            if (!backBtn) return;

            backBtn.addEventListener('click', (e) => {
                e.preventDefault();
                const isContactPage = window.location.pathname.endsWith('contact.html');
                if (isContactPage) {
                    if (window.history.length > 1) {
                        window.history.back();
                    } else {
                        window.location.href = "{{ '/' | relative_url }}";
                    }
                } else {
                    if (window.history.length > 1 && document.referrer.includes(window.location.host)) {
                        window.history.back();
                    } else {
                        window.location.href = "{{ '/' | relative_url }}";
                    }
                }
            });
        });
    </script>
    {% endif %}
    
    <h1>
        <span class="tool-title-main">{{ page.title | default: "Creative-Support-Tools" }}</span>
        {% if page.url != "/" and page.url != "/index.html" %}
        <span class="title-separator"> - </span>
        <a href="{{ '/' | relative_url }}" class="header-brand-link" title="トップページへ戻る">Creative-Support-Tools</a>
        {% endif %}
    </h1>

    <a href="{{ '/contact.html' | relative_url }}" class="contact-icon" title="お問い合わせ" style="position: absolute; right: 20px; color: var(--main-text); text-decoration: none; display: flex; align-items: center; justify-content: center; opacity: 0.7; transition: opacity 0.2s;">
        <svg viewBox="0 0 24 24" width="22" height="22" stroke="currentColor" stroke-width="2" fill="none"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
            <polyline points="22,6 12,13 2,6"></polyline>
        </svg>
    </a>
</header>
