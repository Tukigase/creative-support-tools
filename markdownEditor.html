---
layout: default
title: Markdownエディター (Mermaid対応) - Creative-Support-Tools
css: markdownEditor.css
js: markdownEditor.js
---
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<main class="container-fluid">
    <div class="editor-toolbar panel">
        <div class="toolbar-group">
            <label class="action-btn file-btn">
                📁 読み込み
                <input type="file" id="importFile" accept=".md" style="display: none;">
            </label>
            <button id="exportMdBtn" class="action-btn">💾 .md保存</button>

            <select id="themeSelect" class="styled-select" style="margin-left: 10px;">
                <option value="theme-zenn">🎨 Zenn風</option>
                <option value="theme-github">🏢 GitHub風</option>
            </select>
        </div>
        <div class="toolbar-group">
            <button id="exportImgBtn" class="action-btn export-img-btn">🖼️ 画像(PNG)</button>
            <button id="exportPdfBtn" class="action-btn export-btn">📄 PDF</button>
        </div>
    </div>

    <div class="studio-layout">
        <aside class="panel left-panel editor-panel">
            <textarea id="mdInput" spellcheck="false">
                # Creative Markdown Editor

                ここは完全ブラウザ完結のMarkdownエディターです。
                記述した内容は右側にリアルタイムでプレビューされます。

                ## ✨ 特徴
                - **Mermaid対応**: サーバーなしで図表を描画できます。
                - **テーマ切替**: Zenn風とGitHub風の見た目をワンクリックで切り替え。
                - **PDF出力**: 美しい仕様書をそのままPDFとしてエクスポート。

                ## 📊 Mermaidのテスト

                ```mermaid
                graph TD;
                    A[Markdown入力] --> B(marked.jsでHTML化);
                    A --> C(mermaid.jsでSVG化);
                    B --> D{プレビュー画面};
                    C --> D;
                    D --> E[PDFでエクスポート];
                ```
            </textarea>
        </aside>

        <section class="panel right-panel preview-panel">
            <div id="mdPreview" class="markdown-body theme-zenn">
            </div>
        </section>
    </div>
