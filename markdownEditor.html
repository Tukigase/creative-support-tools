# Creative Markdown Editor

ここは完全ブラウザ完結のMarkdownエディターです。
記述した内容は右側にリアルタイムでプレビューされます。

## ✨ 特徴
- **Mermaid対応**: サーバーなしで図表を描画できます。
- **テーマ切替**: Zenn風とGitHub風の見た目をワンクリックで切り替え。
- **PDF出力**: 美しい仕様書をそのままPDFとしてエクスポート。

## 📊 Mermaidのテスト

```mermaid
graph TD;
    A[Markdown入力] --> B(marked.jsでHTML化);
    A --> C(mermaid.jsでSVG化);
    B --> D{プレビュー画面};
    C --> D;
    D --> E[PDFでエクスポート];
```
