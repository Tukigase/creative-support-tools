---
layout: default
title: Webフォント比較テスター - Creative-Support-Tools
css: fontTester.css
js: fontTester.js
---
<main class="container-fluid">
    <div class="studio-layout">

        <aside class="panel left-panel">
            <section class="panel-section">
                <h2>プレビューテキスト</h2>
                <div class="input-group">
                    <textarea id="previewText" rows="4">あのイーハトーヴォのすきとおった風、夏でも底に冷たさをもつ青いそら、うつくしい森で飾られたモリーオ市。
ABCDEFGHIJKLMNOPQRSTUVWXYZ</textarea>
                </div>
            </section>

            <section class="panel-section mt-4">
                <h2>タイポグラフィ設定</h2>
                <div class="slider-group">
                    <div class="slider-header"><label>文字サイズ</label><span id="fontSizeVal" class="val-badge">16px</span>
                    </div>
                    <input type="range" id="fontSizeSlider" min="10" max="64" value="16" step="1">
                </div>
                <div class="slider-group">
                    <div class="slider-header"><label>行間</label><span id="lineHeightVal" class="val-badge">1.6</span>
                    </div>
                    <input type="range" id="lineHeightSlider" min="1.0" max="3.0" value="1.6" step="0.1">
                </div>
                <div class="slider-group">
                    <div class="slider-header"><label>字送り</label><span id="letterSpacingVal"
                            class="val-badge">0em</span></div>
                    <input type="range" id="letterSpacingSlider" min="-0.1" max="0.5" value="0" step="0.01">
                </div>
                <div class="toggle-group mt-3">
                    <label class="toggle-label">
                        <input type="checkbox" id="fontWeightToggle">
                        <span class="toggle-text">太字 (Bold) にする</span>
                    </label>
                </div>
            </section>

            <section class="panel-section mt-4">
                <h2>カラーテスト</h2>
                <div class="color-controls">
                    <div class="color-row">
                        <label>背景色</label>
                        <input type="color" id="bgColorPicker" value="#FFFFFF">
                    </div>
                    <div class="color-row">
                        <label>文字色</label>
                        <input type="color" id="textColorPicker" value="#1E293B">
                    </div>
                </div>
            </section>
            <section class="panel-section mt-4" style="margin-bottom: 20px;">
                <h2>カスタムフォントの追加</h2>
                <div class="custom-font-form">
                    <div class="input-group" style="margin-bottom: 10px;">
                        <label
                            style="font-size: 0.85rem; color: var(--sub-text); margin-bottom: 4px; display: block;">表示名
                            (例: 私の游ゴシック)</label>
                        <input type="text" id="customFontName" placeholder="表示名を入力"
                            style="width: 100%; padding: 10px; background-color: var(--bg-footer); color: var(--main-text); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; box-sizing: border-box;">
                    </div>
                    <div class="input-group" style="margin-bottom: 10px;">
                        <label
                            style="font-size: 0.85rem; color: var(--sub-text); margin-bottom: 4px; display: block;">CSS
                            font-family (例: "Yu Gothic", sans-serif)</label>
                        <input type="text" id="customFontCss" placeholder="font-familyの値を入力"
                            style="width: 100%; padding: 10px; background-color: var(--bg-footer); color: var(--main-text); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; box-sizing: border-box;">
                    </div>
                    <button class="action-btn" id="addCustomFontBtn"
                        style="background-color: var(--main-btn); color: var(--bg-base); border: none;">リストに追加</button>
                </div>
            </section>
        </aside>

        <section class="panel right-panel">
            <h2>フォント比較プレビュー</h2>
            <div id="fontListContainer" class="font-list-container">
            </div>
        </section>

    </div>
</main>
