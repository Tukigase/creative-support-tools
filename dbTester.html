---
layout: default
title: DBテスター (Wasm SQLite)
css: dbTester.css
js: dbTester.js
---
<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.js"></script>

<main class="container-fluid">
    <div class="editor-toolbar panel">
        <div class="toolbar-group">
            <button id="runSqlBtn" class="action-btn run-btn">▶ RUN SQL</button>
            <span id="statusText" class="status-text">🔄 データベースエンジン準備中...</span>
        </div>
        <div class="toolbar-group">
            <button id="resetDbBtn" class="action-btn">🗑️ DBリセット</button>
        </div>
    </div>

    <div class="studio-layout">
        <aside class="panel left-panel editor-panel">
            <textarea id="sqlInput" spellcheck="false" placeholder="ここにSQLを入力してください...">
-- テーブル作成
CREATE TABLE users (
    id INTEGER PRIMARY KEY,
    name TEXT NOT NULL,
    role TEXT
);

-- テストデータの挿入
INSERT INTO users (name, role) VALUES 
('Alice', 'Admin'),
('Bob', 'Editor'),
('Charlie', 'Viewer');

-- データを確認
SELECT * FROM users;
            </textarea>
        </aside>

        <main class="panel right-panel preview-panel">
            <div id="resultArea" class="result-area">
                <div class="empty-state">実行結果がここに表示されます</div>
            </div>
        </main>
    </div>
</main>
